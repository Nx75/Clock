<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
 
    <title>Clock</title>
</head>
<body>
    <main>
        <div class="header">
            <div class="brand">
                <div class="logo">
                    NX75
                </div>
                <div class="inner">
                    <div class="title">Advanced Clock</div>
                    <div class="subtitile">12/24 Hour</div>
                </div>
            </div>
            <div class="toggle-button">
                <div class="btn-active" id="btn-12">
                    12 Hours
                </div>
                <div class="btn" id="btn-24">
                    24 Hours
                </div>
            </div>
            <div class="display">
                <div class="time-wrap">
                    <div class="time" id="time">00:00:00</div>
                    <div class="abbreviations" id="abbreviations">AM</div>
                </div>
            </div>
            <div class="info">
                <div id="date">January 1, 2026</div>
                <div class="day" id="day">Sunday</div>
            </div>
        </div>
        <div class="footer">
            
        </div>
    </main>
</body>
   <script src="script.js"></script>
</html>
